<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3F3D9E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Stylized "S" wave representing social/audio waves -->
  <path d="M160 200 
           Q160 160 200 140 
           Q240 120 256 140 
           Q272 160 256 180 
           Q240 200 220 200 
           Q200 200 200 220 
           L200 300 
           Q200 340 240 360 
           Q280 380 300 360 
           Q320 340 300 320 
           Q280 300 260 300 
           Q240 300 240 280 
           L240 240"
        fill="none" 
        stroke="white" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <!-- Small dots representing social nodes -->
  <circle cx="340" cy="180" r="12" fill="white"/>
  <circle cx="380" cy="140" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="360" cy="220" r="8" fill="rgba(255,255,255,0.4)"/>
</svg>
